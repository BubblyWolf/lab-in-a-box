apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pulse.fullname" . }}-api
  labels:
    {{- include "pulse.labels" . | nindent 4 }}
    app.kubernetes.io/name: {{ include "pulse.fullname" . }}-api
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicaCount.api }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "pulse.fullname" . }}-api
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "pulse.labels" . | nindent 8 }}
        app.kubernetes.io/name: {{ include "pulse.fullname" . }}-api
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.service.api.port }}"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: api
          image: "{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
          imagePullPolicy: {{ .Values.image.api.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.api.port }}
          env:
            - name: REDIS_URL
              value: redis://{{ include "pulse.fullname" . }}-redis:{{ .Values.service.redis.port }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources.api | nindent 12 }}