# Load generator: floods the Pulse API with jobs so the worker's CPU rises
# and the HorizontalPodAutoscaler scales it up. Run via `make load`.
apiVersion: batch/v1
kind: Job
metadata:
  name: pulse-load
  namespace: pulse
  labels:
    app.kubernetes.io/part-of: pulse
    app.kubernetes.io/component: load-generator
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: pulse
        app.kubernetes.io/component: load-generator
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
      containers:
        - name: load
          image: curlimages/curl:8.10.1
          command: ["sh", "-c"]
          args:
            - |
              echo "Flooding pulse-api with jobs..."
              i=0
              while [ $i -lt 5000 ]; do
                curl -s -o /dev/null -X POST http://pulse-api:3001/jobs \
                  -H 'content-type: application/json' -d '{"type":"load"}'
                i=$((i + 1))
                [ $((i % 500)) -eq 0 ] && echo "submitted $i jobs"
              done
              echo "Done — submitted $i jobs."
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
