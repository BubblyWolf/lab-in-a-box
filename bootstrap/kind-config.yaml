# lab-in-a-box Kind cluster configuration
# 1 control-plane + 2 workers with ingress port mappings

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: lab-in-a-box

networking:
  apiServerAddress: "127.0.0.1"
  apiServerPort: 6443
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"

nodes:
  # Control plane with ingress ports exposed to host
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
    labels:
      topology.kubernetes.io/zone: control-plane
      node-type: control-plane

  # Worker node 1
  - role: worker
    labels:
      topology.kubernetes.io/zone: zone-a
      node-type: worker
      workload-type: general

  # Worker node 2
  - role: worker
    labels:
      topology.kubernetes.io/zone: zone-b
      node-type: worker
      workload-type: general