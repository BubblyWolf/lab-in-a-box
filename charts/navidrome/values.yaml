image:
  repository: deluan/navidrome
  tag: "0.53.3"
  pullPolicy: IfNotPresent

service:
  port: 4533

env:
  ND_MUSICFOLDER: /music
  ND_DATAFOLDER: /data
  ND_SCANSCHEDULE: "1m"
  ND_LOGLEVEL: "info"
  ND_PORT: "4533"
  ND_SESSIONTIMEOUT: "24h"

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

persistence:
  enabled: false
  music:
    size: 10Gi
    storageClass: "standard"
  data:
    size: 5Gi
    storageClass: "standard"

sampleMusic:
  enabled: false
  urls: []

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000