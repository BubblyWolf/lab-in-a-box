name: Validate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-helm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint charts/pulse

      - name: Template Helm chart
        run: helm template charts/pulse > /dev/null

  smoke-node:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, worker, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --omit=dev --prefix apps/demo/${{ matrix.service }}

      - name: Check JS files
        run: |
          for f in apps/demo/${{ matrix.service }}/*.js; do
            [ -f "$f" ] || continue
            echo "Checking $f"
            node --check "$f"
          done

  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -L -o kubeconform.tar.gz "https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz"
          tar -xzf kubeconform.tar.gz
          chmod +x kubeconform
          sudo mv kubeconform /usr/local/bin/

      - name: Validate manifests
        run: |
          kubeconform \
            -ignore-missing-schemas \
            -skip Application,ClusterPolicy \
            -summary \
            gitops/ security/

