<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="1280" height="640" fill="#0d1117"/>
  <rect x="0" y="0" width="12" height="640" fill="#3fb950"/>

  <!-- decorative cluster: 3 nodes top-right -->
  <g opacity="0.9">
    <rect x="1040" y="70" width="70" height="70" rx="12" fill="#161b22" stroke="#30363d" stroke-width="2"/>
    <rect x="1120" y="70" width="70" height="70" rx="12" fill="#161b22" stroke="#30363d" stroke-width="2"/>
    <rect x="1080" y="150" width="70" height="70" rx="12" fill="#161b22" stroke="#30363d" stroke-width="2"/>
    <circle cx="1075" cy="105" r="7" fill="#3fb950"/>
    <circle cx="1155" cy="105" r="7" fill="#58a6ff"/>
    <circle cx="1115" cy="185" r="7" fill="#bc8cff"/>
  </g>

  <!-- kicker -->
  <text x="92" y="122" fill="#3fb950" font-size="26" font-weight="600" letter-spacing="3">ONE COMMAND  ·  LOCAL  ·  MIT LICENSED</text>

  <!-- title -->
  <text x="88" y="238" fill="#e6edf3" font-size="104" font-weight="800" letter-spacing="-2">lab-in-a-box</text>

  <!-- tagline -->
  <text x="92" y="312" fill="#adbac7" font-size="38" font-weight="400">Learn a real production Kubernetes platform by running one.</text>
  <text x="92" y="362" fill="#768390" font-size="38" font-weight="400">Offline · on your laptop · in 5 minutes.</text>

  <!-- tech chips -->
  <g font-size="26" font-weight="500" text-anchor="middle">
    <g>
      <rect x="90"  y="424" width="100" height="54" rx="27" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
      <text x="140" y="458" fill="#c9d1d9">Kind</text>
    </g>
    <g>
      <rect x="206" y="424" width="132" height="54" rx="27" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
      <text x="272" y="458" fill="#c9d1d9">Argo CD</text>
    </g>
    <g>
      <rect x="354" y="424" width="166" height="54" rx="27" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
      <text x="437" y="458" fill="#c9d1d9">Prometheus</text>
    </g>
    <g>
      <rect x="536" y="424" width="132" height="54" rx="27" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
      <text x="602" y="458" fill="#c9d1d9">Grafana</text>
    </g>
    <g>
      <rect x="684" y="424" width="92"  height="54" rx="27" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
      <text x="730" y="458" fill="#c9d1d9">Loki</text>
    </g>
    <g>
      <rect x="792" y="424" width="124" height="54" rx="27" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
      <text x="854" y="458" fill="#c9d1d9">Kyverno</text>
    </g>
    <g>
      <rect x="932" y="424" width="96"  height="54" rx="27" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
      <text x="980" y="458" fill="#c9d1d9">Trivy</text>
    </g>
  </g>

  <!-- command -->
  <text x="92" y="546" fill="#58a6ff" font-size="30" font-weight="500" font-family="'SF Mono', 'Cascadia Code', Consolas, monospace">$ make up  →  make deploy-local  →  make demo</text>

  <!-- footer -->
  <text x="92" y="602" fill="#636e7b" font-size="26" font-weight="400">github.com/BubblyWolf/lab-in-a-box</text>
</svg>
