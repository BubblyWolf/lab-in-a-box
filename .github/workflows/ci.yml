name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, worker, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name (lowercased — registries require lowercase)
        id: image
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          echo "name=ghcr.io/${OWNER,,}/pulse-${{ matrix.service }}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: apps/demo/${{ matrix.service }}
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          provenance: false

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy --version

      - name: Trivy scan (report-only, results to Security tab)
        run: |
          trivy image \
            --format sarif \
            --output trivy-${{ matrix.service }}.sarif \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            ${{ steps.image.outputs.name }}:${{ github.sha }}

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: pulse-${{ matrix.service }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.image.outputs.name }}:${{ github.sha }}
          format: spdx-json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign sign --yes ${{ steps.image.outputs.name }}:${{ github.sha }}

