apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pulse-dashboards
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/BubblyWolf/lab-in-a-box
    targetRevision: HEAD
    path: observability/dashboards
    directory:
      recurse: false
      include: "pulse-dashboard-configmap.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true