apiVersion: v1
kind: Service
metadata:
  name: {{ include "pulse.fullname" . }}-worker
  labels:
    {{- include "pulse.labels" . | nindent 4 }}
    app.kubernetes.io/name: {{ include "pulse.fullname" . }}-worker
    app.kubernetes.io/component: worker
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "pulse.fullname" . }}-worker
    app.kubernetes.io/component: worker
  ports:
    - name: metrics
      port: {{ .Values.service.worker.port }}
      targetPort: metrics
      protocol: TCP