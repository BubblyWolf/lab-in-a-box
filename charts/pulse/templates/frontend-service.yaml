apiVersion: v1
kind: Service
metadata:
  name: {{ include "pulse.fullname" . }}-frontend
  labels:
    {{- include "pulse.labels" . | nindent 4 }}
    app.kubernetes.io/name: {{ include "pulse.fullname" . }}-frontend
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "pulse.fullname" . }}-frontend
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: {{ .Values.service.frontend.port }}
      targetPort: http
      protocol: TCP